name: Docs

on:
  push:
    branches: [main, v2]
    paths:
      - 'docs/**'
      - 'layers/**/*.rs'
      - 'bin/**/*.rs'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Sync docs from layers
        run: bash scripts/sync-docs.sh

      - name: Generate OpenAPI spec
        run: |
          cargo run --bin syfrah-openapi --release > docs/public/openapi.json

      - name: Build Starlight site
        working-directory: docs
        run: |
          npm ci
          npx astro build

      - name: Build Rust API docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "--default-theme ayu"

      - name: Copy rustdoc into site
        run: cp -r target/doc docs/dist/api

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
