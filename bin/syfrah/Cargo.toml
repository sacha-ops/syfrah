[package]
name = "syfrah-bin"
description = "Syfrah CLI binary"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "syfrah"
path = "src/main.rs"

[dependencies]
syfrah-compute = { path = "../../layers/compute" }
syfrah-core = { path = "../../layers/core" }
syfrah-fabric = { path = "../../layers/fabric" }
syfrah-org = { path = "../../layers/org" }
syfrah-storage = { path = "../../layers/storage" }
syfrah-overlay = { path = "../../layers/overlay" }
syfrah-state = { path = "../../layers/state" }
syfrah-controlplane = { path = "../../layers/controlplane" }
openraft = { version = "0.10.0-alpha.17", features = ["serde", "type-alias"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json.workspace = true
tempfile = "3"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
tokio.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
serde.workspace = true
libc = "0.2"
dirs = "6"
hostname = "0.4"
ureq = { version = "2", features = ["json"] }
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"
